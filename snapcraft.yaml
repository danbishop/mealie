name: mealie
title: Mealie
license: GPL-3.0
website: https://mealie.io/
donation: https://github.com/sponsors/danbishop
source-code: https://github.com/mealie-recipes/mealie
issues: https://github.com/danbishop/mealie/issues
contact: d@nbishop.uk
base: core24
adopt-info: backend
summary: Self-hosted recipe manager and meal planner
description: |
  Mealie is a self-hosted recipe manager and meal planner.
  This snap runs on port 9925. This isn't currently configurable.

grade: stable
confinement: strict

apps:
  mealie:
    command: bin/run.sh
    daemon: simple
    install-mode: enable
    plugs: [network, network-bind]
    environment:
      DATA_DIR: $SNAP_COMMON/data
      PRODUCTION: "true"
      API_PORT: "9925"

parts:
  frontend:
    plugin: npm
    source: https://github.com/mealie-recipes/mealie.git
    source-subdir: frontend
    build-snaps:
      # use Node.js Snap during the build-time only
      - node/24/stable
    build-packages:
      - curl
      - gcc
      - g++
      - make
    override-pull: |
      craftctl default

      # Find the latest tag on the current branch
      LATEST_TAG=$(git describe --tags --abbrev=0)
      
      # Switch the source code to that tag
      git checkout $LATEST_TAG
    override-build: |
      # Set proxies so that launchpad builds work
      if [ -n "${http_proxy:-}" ]; then
        export YARN_HTTP_PROXY="${http_proxy:-}"
        export YARN_HTTPS_PROXY="${http_proxy:-}"
      fi
      cd $CRAFT_PART_SRC/frontend
      yarn install --prefer-offline --frozen-lockfile --non-interactive --production=false
      yarn generate

      # Move compiled frontend to prime
      mkdir -p "${CRAFT_PRIME}"/frontend
      cp -a ${CRAFT_PART_SRC}/frontend/dist/* ${SNAPCRAFT_PRIME}/frontend
      craftctl default

  backend:
    plugin: python
    after:
      - frontend
    source: https://github.com/mealie-recipes/mealie.git
    override-pull: |
      craftctl default
      # Find the latest tag on the current branch
      LATEST_TAG=$(git describe --tags --abbrev=0)
      
      # Switch the source code to that tag
      git checkout $LATEST_TAG
      craftctl set version="$LATEST_TAG"
    python-packages:
      - uvicorn
      - gunicorn
    stage-packages:
      - libpq-dev
      - libsqlite3-dev
      - libldap2
      - libsasl2-2
    build-packages:
      - libldap2-dev
      - libsasl2-dev
      - libssl-dev
      - python3-dev
      - gcc
      - python3-pip
    override-build: |
      # 1. Install local dependencies
      pip install --break-system-packages .

      # Install frontend
      cp -a ${SNAPCRAFT_PRIME}/frontend ${CRAFT_PART_SRC}/mealie/frontend
      
      # 2. Build the part
      pip install --break-system-packages uv
      uv build --out-dir $CRAFT_PART_INSTALL/dist
      uv export --no-editable --no-emit-project --extra pgsql --format requirements-txt --output-file $CRAFT_PART_INSTALL/dist/requirements.txt \
      && MEALIE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])") \
      && echo "mealie[pgsql]==${MEALIE_VERSION} \\" >> $CRAFT_PART_INSTALL/dist/requirements.txt \
      && pip hash $CRAFT_PART_INSTALL/dist/mealie-${MEALIE_VERSION}-py3-none-any.whl | tail -n1 | tr -d '\n' >> $CRAFT_PART_INSTALL/dist/requirements.txt \
      && echo " \\" >> dist/requirements.txt \
      && pip hash $CRAFT_PART_INSTALL/dist/mealie-${MEALIE_VERSION}.tar.gz | tail -n1 >> $CRAFT_PART_INSTALL/dist/requirements.txt
      snapcraftctl build

      # install nltk data for the ingredient parser
      mkdir -p $CRAFT_PART_INSTALL/nltk_data/
      python -m nltk.downloader -d $CRAFT_PART_INSTALL/nltk_data/ averaged_perceptron_tagger_eng
      rm -rf $CRAFT_PART_INSTALL/nltk_data/

      # 3. SMARTER BINARY RESCUE
      mkdir -p $CRAFT_PART_INSTALL/bin
      # Find gunicorn anywhere in the install directory
      GUNICORN_PATH=$(find $CRAFT_PART_INSTALL -name "gunicorn" -type f | head -n 1)
      
      # Only copy if we found it AND it's not already in the final bin folder
      if [ -n "$GUNICORN_PATH" ] && [ "$GUNICORN_PATH" != "$CRAFT_PART_INSTALL/bin/gunicorn" ]; then
        cp "$GUNICORN_PATH" $CRAFT_PART_INSTALL/bin/
        chmod +x $CRAFT_PART_INSTALL/bin/gunicorn
      fi

  config:
    plugin: dump
    source: .
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/bin

      # Launch Script
      cat <<EOF > $CRAFT_PART_INSTALL/bin/run.sh
      #!/bin/bash
      exec mealie
      EOF

      chmod +x $CRAFT_PART_INSTALL/bin/*.sh

lint:
  ignore:
    - library